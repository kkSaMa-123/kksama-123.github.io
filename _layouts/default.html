<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}
    </title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.author.name }}</a>
      <nav class="nav" aria-label="主导航">
        <a href="{{ '/#articles' | relative_url }}">文章</a>
        <a href="{{ site.author.github }}">GitHub</a>
      </nav>
    </header>

    {{ content }}

    <footer class="footer">
      <span>© {{ 'now' | date: '%Y' }} {{ site.author.name }}</span>
      <a href="{{ '/' | relative_url }}">返回首页</a>
    </footer>
  </body>
</html>
